# Data manifest — the marketplace + Luna's installer read this WITHOUT importing
# the plugin's Python. Keep it in sync with the PluginManifest in __init__.py.

name = "plugin-image-gen"
version = "0.3.4"
description = "Generate and edit images inline in chat with the best models — Nano Banana Pro (Gemini), GPT Image, and FLUX."
entry = "plugin_image_gen"
sdk_version = "0"
license = "MIT"
routes_module = "routes"
tags = ["image", "image-generation", "gemini", "nano-banana", "openai", "flux", "media", "chat"]
readme = """
# plugin-image-gen

Gives the Luna agent the ability to **create and edit images** and show them
**inline in the chat** (same render hook `plugin-charts` / `plugin-giphy` use).
It wraps the best image models behind one tool surface.

## Models (`model=`, default "best")
- `nano-banana-pro` — Google **Gemini 3 Pro Image** (default; top quality, clean text)
- `nano-banana` — Google **Gemini 2.5 Flash Image** (cheaper/faster)
- `gpt-image-1` — **OpenAI GPT Image**
- `flux-pro` — **FLUX 1.1 [pro]** (Black Forest Labs)
- `flux-pro-ultra` — **FLUX 1.1 [pro] ultra**

## Tools
- `generate_image(prompt, model="best", aspect_ratio="1:1")` — text → image, shown inline.
- `edit_image(prompt, image_path|image_url, model="best", aspect_ratio="1:1")` —
  restyle/modify a reference image (Gemini / GPT Image).
- `list_image_models()` — list models + which providers have a key configured.

## How it renders
Generated bytes are saved server-side and served from
`/api/p/plugin-image-gen/file/<id>`; the tool returns a small `embed_iframe`
that loads that URL inline (no megabytes of base64 in the model's context).

## Where images are saved
Every generated/edited image is also copied into **Files** under `images/`
(when a storage provider is enabled), so you can find, keep, and re-download it
from the Files browser. The inline preview keeps using the public route above
(the Files `/read` URL is auth-gated and can't render inside the chat iframe).
The tool result reports the Files location (`saved_to_files`).

## API keys
Per provider, resolved as: vault `<provider>_api_key` → env
`LUNA_<PROVIDER>_API_KEY` → native env. Configure the providers you want:
- Gemini: vault `gemini_api_key` / env `LUNA_GEMINI_API_KEY` (or `GEMINI_API_KEY`)
- OpenAI: vault `openai_api_key` / env `LUNA_OPENAI_API_KEY` (or `OPENAI_API_KEY`)
- FLUX (BFL): vault `bfl_api_key` / env `LUNA_BFL_API_KEY` (or `BFL_API_KEY`)

If a provider has no key, its models report `key_configured: false` and the
tools return an actionable "add a key" error rather than failing silently.

## Cloud key provisioning (gateway proxy)
Each provider also honors a base-url override so the real key never lands on the
tenant machine: set `LUNA_<PROVIDER>_BASE_URL` (`LUNA_GEMINI_BASE_URL`,
`LUNA_OPENAI_BASE_URL`, `LUNA_BFL_BASE_URL`) to `{gateway}/proxy/<provider>` and
the matching `LUNA_<PROVIDER>_API_KEY` to the gateway token. When the base-url is
unset the provider's real upstream + real key are used (BYO / local dev). The
`credential_slots()` advertise these base-url vars so the control plane marks
each provider as proxy-provisionable.

Built against `luna_sdk` v0 — no `import luna.*`.

Source: https://github.com/huemorgan/plugin-image-gen
"""

[requires]
tools = 3

[[tools]]
name = "generate_image"
description = "Generate an image from a text prompt and show it inline in the chat."
policy = "ask"
risk_level = "low"

[[tools]]
name = "edit_image"
description = "Edit/restyle a reference image and show the result inline."
policy = "ask"
risk_level = "low"

[[tools]]
name = "list_image_models"
description = "List image models and which providers have a key configured."
policy = "auto_approve"
risk_level = "low"
